<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snail Trail</title>
  <style>
    /* Design tokens */
    :root {
      --color-wall: #2a2a2a;
      --color-open: #d4d4d4;
      --color-treasure: #f0b429;
      --color-player: #3b82f6;
      --color-snail: #f97316;
      --color-snail-shell: #7c2d12;
      --color-overlay-bg: rgba(0, 0, 0, 0.72);
      --color-surface: #1e1e2e;
      --color-text: #f5f5f5;
      --color-accent: #f0b429;
      --radius: 8px;
      --gap: 1rem;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--color-surface);
      color: var(--color-text);
      font-family: system-ui, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: var(--gap);
      padding: 1rem;
    }

    h1.game-title {
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      letter-spacing: 0.05em;
      color: var(--color-accent);
      text-align: center;
    }

    /* Canvas */
    #game-canvas {
      display: block;
      border: 3px solid #3f3f5c;
      border-radius: var(--radius);
      image-rendering: pixelated;
    }

    /* Overlay & screen positioning */
    .game-wrapper {
      position: relative;
      display: inline-block;
      line-height: 0;
    }

    /* Screen / overlay shared styles */
    .screen,
    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      border-radius: var(--radius);
      padding: 2rem;
      text-align: center;
    }

    /* Start screen sits on top of an empty canvas */
    #screen-start {
      background: var(--color-surface);
      color: var(--color-text);
      position: static;
      border: 3px solid #3f3f5c;
      border-radius: var(--radius);
      padding: 2.5rem 3rem;
      min-width: 300px;
    }

    #screen-start h2 {
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
      color: var(--color-accent);
    }

    #screen-start p {
      font-size: 0.9rem;
      color: #aaa;
      margin-bottom: 1.25rem;
    }

    /* Overlays */
    .overlay {
      background: var(--color-overlay-bg);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
    }

    .overlay h2 {
      font-size: clamp(1.4rem, 3vw, 2rem);
    }

    .overlay p {
      font-size: 1rem;
      color: #ccc;
    }

    #overlay-win h2 { color: #4ade80; }
    #overlay-lose h2 { color: #f87171; }

    /* Fieldset for difficulty */
    fieldset.difficulty-group {
      border: 1px solid #3f3f5c;
      border-radius: var(--radius);
      padding: 0.75rem 1.25rem;
      margin-bottom: 0.5rem;
    }

    fieldset.difficulty-group legend {
      font-size: 0.8rem;
      color: #aaa;
      padding: 0 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .difficulty-option {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.3rem 0;
      cursor: pointer;
    }

    .difficulty-option input[type="radio"] {
      accent-color: var(--color-accent);
      width: 1rem;
      height: 1rem;
    }

    .difficulty-option label {
      cursor: pointer;
      font-size: 0.9rem;
    }

    /* Buttons */
    .btn {
      background: var(--color-accent);
      color: #1a1a1a;
      border: none;
      border-radius: var(--radius);
      padding: 0.65rem 2rem;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: filter 0.15s ease, transform 0.1s ease;
      min-width: 140px;
    }

    .btn:hover,
    .btn:focus-visible {
      filter: brightness(1.15);
      outline: 3px solid #fff6;
      outline-offset: 2px;
    }

    .btn:active {
      transform: scale(0.97);
    }

    /* Hidden utility */
    .hidden {
      display: none !important;
    }

    /* Visually hidden but accessible */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0,0,0,0);
      white-space: nowrap;
      border: 0;
    }

    /* Reduced motion */
    @media (prefers-reduced-motion: reduce) {
      *,
      *::before,
      *::after {
        transition: none !important;
        animation: none !important;
      }
    }
  </style>
</head>
<body>
  <h1 class="game-title">🐌 Snail Trail</h1>

  <!-- Start Screen (visible before game begins) -->
  <div id="screen-start">
    <h2>Choose Difficulty</h2>
    <p>Navigate the maze — reach the treasure before the snails catch you!</p>

    <fieldset class="difficulty-group">
      <legend>Difficulty</legend>

      <div class="difficulty-option">
        <input type="radio" name="difficulty" id="diff-easy" value="easy" checked />
        <label for="diff-easy">Easy — 15×15, 1 Snail</label>
      </div>

      <div class="difficulty-option">
        <input type="radio" name="difficulty" id="diff-medium" value="medium" />
        <label for="diff-medium">Medium — 20×20, 2 Snails</label>
      </div>

      <div class="difficulty-option">
        <input type="radio" name="difficulty" id="diff-hard" value="hard" />
        <label for="diff-hard">Hard — 25×25, 3 Snails</label>
      </div>
    </fieldset>

    <button id="btn-start" class="btn">Play</button>
    <p style="font-size:0.75rem;color:#666;margin-top:0.5rem;">Arrow keys or WASD to move</p>
  </div>

  <!-- Game canvas wrapper (hidden until play begins) -->
  <div class="game-wrapper hidden" id="game-area">
    <canvas
      id="game-canvas"
      aria-label="Snail Trail game canvas"
      role="img"
    ></canvas>

    <!-- Win Overlay -->
    <div id="overlay-win" class="overlay hidden">
      <h2>You Found the Treasure! 🏆</h2>
      <p>You navigated the maze and reached the treasure chest!</p>
      <button id="btn-restart-win" class="btn">New Game</button>
    </div>

    <!-- Lose Overlay -->
    <div id="overlay-lose" class="overlay hidden">
      <h2>Caught by a Snail! 🐌</h2>
      <p>A snail caught up with you. Better luck next time!</p>
      <button id="btn-restart-lose" class="btn">Try Again</button>
    </div>
  </div>

  <!-- ARIA live region for screen reader announcements -->
  <div id="game-status" class="sr-only" aria-live="polite" aria-atomic="true"></div>

  <script>
  // ── Constants ────────────────────────────────────────────────────────────
  const CELL = Object.freeze({ WALL: 'wall', OPEN: 'open', START: 'start', TREASURE: 'treasure' });
  const PHASE = Object.freeze({ START: 'start', PLAYING: 'playing', WIN: 'win', LOSE: 'lose' });
  const DIRECTION_DELTA = Object.freeze({ up:{dcol:0,drow:-1}, down:{dcol:0,drow:1}, left:{dcol:-1,drow:0}, right:{dcol:1,drow:0} });

  // ── Map generation ────────────────────────────────────────────────────────
  function makeGrid(cols, rows, defaultType) {
    const cells = [];
    for (let row = 0; row < rows; row++) {
      const rowArr = [];
      for (let col = 0; col < cols; col++) rowArr.push({ col, row, type: defaultType });
      cells.push(rowArr);
    }
    return { cols, rows, cells };
  }
  function shuffle(array) {
    for (let i = array.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
  }
  function getNeighboursTwoAway(grid, col, row) {
    return [{col,row:row-2},{col,row:row+2},{col:col-2,row},{col:col+2,row}]
      .filter(n => n.row>=0 && n.row<grid.rows && n.col>=0 && n.col<grid.cols && grid.cells[n.row][n.col].type===CELL.WALL);
  }
  function carveWall(grid, fromCol, fromRow, toCol, toRow) {
    grid.cells[(fromRow+toRow)/2][(fromCol+toCol)/2].type = CELL.OPEN;
    grid.cells[toRow][toCol].type = CELL.OPEN;
  }
  function findOpenCellInQuadrant(grid, [colMin,colMax], [rowMin,rowMax]) {
    for (let row=rowMin; row<rowMax; row++)
      for (let col=colMin; col<colMax; col++)
        if (grid.cells[row][col].type===CELL.OPEN || grid.cells[row][col].type===CELL.START) return grid.cells[row][col];
    return null;
  }
  function findLastOpenCellInQuadrant(grid, [colMin,colMax], [rowMin,rowMax]) {
    let found = null;
    for (let row=rowMin; row<rowMax; row++)
      for (let col=colMin; col<colMax; col++)
        if (grid.cells[row][col].type===CELL.OPEN) found = grid.cells[row][col];
    return found;
  }
  function removeRandomWalls(grid, count) {
    const candidates = [];
    for (let row=1; row<grid.rows-1; row++)
      for (let col=1; col<grid.cols-1; col++) {
        if (grid.cells[row][col].type!==CELL.WALL) continue;
        const open = [{row:row-1,col},{row:row+1,col},{row,col:col-1},{row,col:col+1}]
          .filter(n=>n.row>=0&&n.row<grid.rows&&n.col>=0&&n.col<grid.cols&&grid.cells[n.row][n.col].type===CELL.OPEN);
        if (open.length >= 2) candidates.push({col,row});
      }
    shuffle(candidates);
    for (let i=0; i<Math.min(count,candidates.length); i++) grid.cells[candidates[i].row][candidates[i].col].type=CELL.OPEN;
  }
  function generateMap(cols, rows, snailCount) {
    const grid = makeGrid(cols, rows, CELL.WALL);
    grid.cells[1][1].type = CELL.OPEN;
    const stack = [{col:1,row:1}];
    while (stack.length) {
      const cur = stack[stack.length-1];
      const unvisited = getNeighboursTwoAway(grid, cur.col, cur.row);
      if (!unvisited.length) { stack.pop(); continue; }
      shuffle(unvisited);
      carveWall(grid, cur.col, cur.row, unvisited[0].col, unvisited[0].row);
      stack.push(unvisited[0]);
    }
    removeRandomWalls(grid, Math.floor(cols*rows*0.04));
    const startCell = findOpenCellInQuadrant(grid, [1,Math.ceil(cols/2)], [1,Math.ceil(rows/2)]);
    if (startCell) startCell.type = CELL.START;
    const treasureCell = findLastOpenCellInQuadrant(grid, [Math.floor(cols/2),cols-1], [Math.floor(rows/2),rows-1]);
    if (treasureCell) treasureCell.type = CELL.TREASURE;
    const openCells = [];
    for (let row=0; row<rows; row++)
      for (let col=0; col<cols; col++)
        if (grid.cells[row][col].type===CELL.OPEN) openCells.push(grid.cells[row][col]);
    shuffle(openCells);
    return { grid, startCell, treasureCell, snailStartCells: openCells.slice(0, snailCount) };
  }

  // ── Pathfinding (A*) ──────────────────────────────────────────────────────
  function heuristic(a, b) { return Math.abs(a.col-b.col)+Math.abs(a.row-b.row); }
  function posKey(col, row) { return `${col},${row}`; }
  function getPassableNeighbours(grid, col, row) {
    return [{col,row:row-1},{col,row:row+1},{col:col-1,row},{col:col+1,row}]
      .filter(n=>n.row>=0&&n.row<grid.rows&&n.col>=0&&n.col<grid.cols&&grid.cells[n.row][n.col].type!==CELL.WALL);
  }
  function reconstructPath(cameFrom, current) {
    const path = [{col:current.col,row:current.row}];
    let node = current;
    while (cameFrom.has(posKey(node.col,node.row))) { node=cameFrom.get(posKey(node.col,node.row)); path.unshift({col:node.col,row:node.row}); }
    return path;
  }
  function findPath(grid, from, to) {
    if (grid.cells[from.row]?.[from.col]?.type===CELL.WALL) return null;
    if (grid.cells[to.row]?.[to.col]?.type===CELL.WALL) return null;
    if (from.col===to.col && from.row===to.row) return [{col:from.col,row:from.row}];
    const openSet=[], closedSet=new Set(), cameFrom=new Map(), gScore=new Map(), fScore=new Map();
    const sk=posKey(from.col,from.row);
    gScore.set(sk,0); fScore.set(sk,heuristic(from,to));
    openSet.push({col:from.col,row:from.row,f:fScore.get(sk)});
    while (openSet.length) {
      const cur=openSet.shift(), ck=posKey(cur.col,cur.row);
      if (cur.col===to.col&&cur.row===to.row) return reconstructPath(cameFrom,cur);
      if (closedSet.has(ck)) continue;
      closedSet.add(ck);
      for (const nb of getPassableNeighbours(grid,cur.col,cur.row)) {
        const nk=posKey(nb.col,nb.row);
        if (closedSet.has(nk)) continue;
        const tg=(gScore.get(ck)??Infinity)+1;
        if (tg<(gScore.get(nk)??Infinity)) {
          cameFrom.set(nk,{col:cur.col,row:cur.row});
          gScore.set(nk,tg);
          const f=tg+heuristic(nb,to); fScore.set(nk,f);
          const entry={col:nb.col,row:nb.row,f};
          let ins=false;
          for (let i=0;i<openSet.length;i++) { if (f<openSet[i].f){openSet.splice(i,0,entry);ins=true;break;} }
          if (!ins) openSet.push(entry);
        }
      }
    }
    return null;
  }

  // ── Renderer ──────────────────────────────────────────────────────────────
  const CELL_SIZE = 32;
  const COLOR = Object.freeze({
    WALL:'#2a2a2a', OPEN:'#d4d4d4', START:'#c8c8c8',
    TREASURE_BG:'#f0b429', TREASURE_FG:'#b8860b',
    PLAYER:'#3b82f6', SNAIL:'#f97316', SNAIL_SHELL:'#7c2d12',
  });
  function drawCell(ctx, cell, cw, ch) {
    const x=cell.col*cw, y=cell.row*ch;
    if (cell.type==='wall') { ctx.fillStyle=COLOR.WALL; ctx.fillRect(x,y,cw,ch); return; }
    ctx.fillStyle=COLOR.OPEN; ctx.fillRect(x,y,cw,ch);
    if (cell.type==='treasure') {
      const m=cw*0.1, w=cw*0.8, h=ch*0.55, cx2=x+m, cy2=y+(ch-h)/2;
      ctx.fillStyle=COLOR.TREASURE_BG; ctx.fillRect(cx2,cy2,w,h);
      ctx.fillStyle=COLOR.TREASURE_FG; ctx.fillRect(cx2,cy2+h*0.4,w,2);
      const ls=cw*0.14; ctx.fillRect(cx2+w/2-ls/2,cy2+h*0.35,ls,ls*0.9);
    }
  }
  function drawPlayer(ctx, player, cw, ch) {
    const cx=player.col*cw+cw/2, cy=player.row*ch+ch/2, r=cw*0.38;
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fillStyle=COLOR.PLAYER; ctx.fill();
    ctx.beginPath(); ctx.arc(cx-r*0.3,cy-r*0.25,r*0.18,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
    ctx.beginPath(); ctx.arc(cx+r*0.3,cy-r*0.25,r*0.18,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
  }
  function drawSnail(ctx, snail, cw, ch) {
    const cx=snail.col*cw+cw/2, cy=snail.row*ch+ch/2, br=cw*0.35, sr=cw*0.20;
    ctx.beginPath(); ctx.arc(cx,cy,br,0,Math.PI*2); ctx.fillStyle=COLOR.SNAIL; ctx.fill();
    ctx.beginPath(); ctx.arc(cx+br*0.15,cy-br*0.1,sr,-Math.PI/2,Math.PI,false);
    ctx.strokeStyle=COLOR.SNAIL_SHELL; ctx.lineWidth=Math.max(1.5,cw*0.05); ctx.stroke();
    ctx.beginPath(); ctx.arc(cx+br*0.15,cy-br*0.1,sr*0.3,0,Math.PI*2); ctx.fillStyle=COLOR.SNAIL_SHELL; ctx.fill();
  }
  function render(canvas, state) {
    const {grid,player,snails}=state;
    canvas.width=grid.cols*CELL_SIZE; canvas.height=grid.rows*CELL_SIZE;
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,canvas.width,canvas.height);
    for (let row=0;row<grid.rows;row++) for (let col=0;col<grid.cols;col++) drawCell(ctx,grid.cells[row][col],CELL_SIZE,CELL_SIZE);
    for (const snail of snails) drawSnail(ctx,snail,CELL_SIZE,CELL_SIZE);
    drawPlayer(ctx,player,CELL_SIZE,CELL_SIZE);
  }

  // ── UI ────────────────────────────────────────────────────────────────────
  let bound = false;
  function showScreen(screenId) {
    const ss=document.getElementById('screen-start'), ow=document.getElementById('overlay-win'),
          ol=document.getElementById('overlay-lose'), ga=document.getElementById('game-area'),
          st=document.getElementById('game-status');
    ss.classList.add('hidden'); ow.classList.add('hidden'); ol.classList.add('hidden');
    if (screenId==='start') { ga.classList.add('hidden'); ss.classList.remove('hidden'); if(st)st.textContent='Choose difficulty and press Play.'; }
    else if (screenId==='game') { ga.classList.remove('hidden'); if(st)st.textContent='Game started. Use arrow keys or WASD to move.'; }
    else if (screenId==='win') { ga.classList.remove('hidden'); ow.classList.remove('hidden'); if(st)st.textContent='You won!'; }
    else if (screenId==='lose') { ga.classList.remove('hidden'); ol.classList.remove('hidden'); if(st)st.textContent='A snail caught you!'; }
  }
  function getSelectedDifficulty() {
    const checked=document.querySelector('input[name="difficulty"]:checked');
    const configs={easy:{name:'Easy',cols:15,rows:15,snailCount:1},medium:{name:'Medium',cols:20,rows:20,snailCount:2},hard:{name:'Hard',cols:25,rows:25,snailCount:3}};
    return configs[checked?checked.value:'easy']??configs.easy;
  }
  function bindControls(handlers) {
    if (bound) return; bound=true;
    document.getElementById('btn-start').addEventListener('click',()=>handlers.onStart());
    document.getElementById('btn-restart-win').addEventListener('click',()=>handlers.onRestart());
    document.getElementById('btn-restart-lose').addEventListener('click',()=>handlers.onRestart());
    const KEY_MAP={ArrowUp:'up',w:'up',W:'up',ArrowDown:'down',s:'down',S:'down',ArrowLeft:'left',a:'left',A:'left',ArrowRight:'right',d:'right',D:'right'};
    document.addEventListener('keydown',(e)=>{ const dir=KEY_MAP[e.key]; if(!dir)return; e.preventDefault(); handlers.onKeyDown(dir); });
  }

  // ── Game logic ────────────────────────────────────────────────────────────
  function createGameState(difficulty) {
    const {grid,startCell,treasureCell,snailStartCells}=generateMap(difficulty.cols,difficulty.rows,difficulty.snailCount);
    return {
      phase:PHASE.PLAYING, difficulty, grid,
      player:{col:startCell.col,row:startCell.row,stepCount:0},
      snails:snailStartCells.map((c,i)=>({id:i,col:c.col,row:c.row})),
      treasureCell:{col:treasureCell.col,row:treasureCell.row},
    };
  }
  function movePlayer(state, direction) {
    const {dcol,drow}=DIRECTION_DELTA[direction];
    const tc=state.player.col+dcol, tr=state.player.row+drow;
    if (tr<0||tr>=state.grid.rows||tc<0||tc>=state.grid.cols) return state;
    if (state.grid.cells[tr][tc].type===CELL.WALL) return state;
    return {...state,player:{col:tc,row:tr,stepCount:state.player.stepCount+1}};
  }
  function resolveSnailTurns(state) {
    return {...state,snails:state.snails.map(snail=>{
      const path=findPath(state.grid,{col:snail.col,row:snail.row},{col:state.player.col,row:state.player.row});
      return (path&&path.length>=2)?{...snail,col:path[1].col,row:path[1].row}:snail;
    })};
  }
  function checkEndConditions(state) {
    if (state.phase!==PHASE.PLAYING) return state;
    if (state.player.col===state.treasureCell.col&&state.player.row===state.treasureCell.row) return {...state,phase:PHASE.WIN};
    if (state.snails.some(s=>s.col===state.player.col&&s.row===state.player.row)) return {...state,phase:PHASE.LOSE};
    return state;
  }

  // ── Wiring ────────────────────────────────────────────────────────────────
  const canvas = document.getElementById('game-canvas');
  let state = null, isProcessing = false;
  function handleStart() {
    state=createGameState(getSelectedDifficulty()); isProcessing=false;
    showScreen('game'); requestAnimationFrame(()=>render(canvas,state));
  }
  function handleRestart() { isProcessing=false; handleStart(); }
  function handleKeyDown(direction) {
    if (!state||state.phase!==PHASE.PLAYING||isProcessing) return;
    isProcessing=true;
    state=movePlayer(state,direction);
    if (state.player.stepCount%2===0&&state.player.stepCount>0) state=resolveSnailTurns(state);
    state=checkEndConditions(state);
    if (state.phase===PHASE.WIN) showScreen('win');
    else if (state.phase===PHASE.LOSE) showScreen('lose');
    requestAnimationFrame(()=>{ render(canvas,state); isProcessing=false; });
  }
  showScreen('start');
  bindControls({onStart:handleStart,onRestart:handleRestart,onKeyDown:handleKeyDown});
  </script>
</body>
</html>
